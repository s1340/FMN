<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Forget-me-not, retro-pixel. Five periwinkle petals pinwheeled around a
       warm-gold heart. Placeholder mark — Sage can supersede the artwork. -->
  <g fill="#8fb0e8">
    <rect x="6" y="1" width="4" height="4" rx="1"/>   <!-- top -->
    <rect x="1" y="6" width="4" height="4" rx="1"/>   <!-- left -->
    <rect x="11" y="6" width="4" height="4" rx="1"/>  <!-- right -->
    <rect x="3" y="10" width="4" height="4" rx="1"/>  <!-- lower-left -->
    <rect x="9" y="10" width="4" height="4" rx="1"/>  <!-- lower-right -->
  </g>
  <!-- petal shading (a hair darker, old-icon depth) -->
  <g fill="#7c9fe0">
    <rect x="6" y="4" width="4" height="1"/>
    <rect x="1" y="9" width="4" height="1"/>
    <rect x="11" y="9" width="4" height="1"/>
  </g>
  <!-- gold heart + white glint -->
  <rect x="6" y="6" width="4" height="4" rx="1" fill="#f6cf5b"/>
  <rect x="7" y="7" width="2" height="2" fill="#fff3c9"/>
</svg>
