<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Forget-me-not: five rounded periwinkle petals (side pair lifted) around
       a gold ring with a dark amber eye. Placeholder mark — Sage can supersede
       the artwork. -->
  <g fill="#8fb0e8">
    <rect x="5.6" y="0.6" width="4.8" height="4.8" rx="2.4"/>   <!-- top -->
    <rect x="0.6" y="4.8" width="4.8" height="4.8" rx="2.4"/>   <!-- left  (lifted) -->
    <rect x="10.6" y="4.8" width="4.8" height="4.8" rx="2.4"/>  <!-- right (lifted) -->
    <rect x="2.6" y="9.8" width="4.8" height="4.8" rx="2.4"/>   <!-- lower-left -->
    <rect x="8.6" y="9.8" width="4.8" height="4.8" rx="2.4"/>   <!-- lower-right -->
  </g>
  <!-- gold ring + dark amber eye (reads as a flower from a distance) -->
  <circle cx="8" cy="8" r="2.5" fill="#f6cf5b"/>
  <circle cx="8" cy="8" r="1.2" fill="#a8681a"/>
</svg>
